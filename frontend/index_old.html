<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Route Optimisation Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="map"></div>

  <div id="sidebar">
    <div id="sidebar-header">
      <h1>🗺 Route Optimiser</h1>
      <span id="job-count">0 jobs</span>
    </div>

    <!-- Step 1: Place depot -->
    <section class="control-group">
      <h2>Step 1 — Depot</h2>
      <button data-mode="depot" onclick="setMode('depot')">
        📍 Set Depot
      </button>
      <p class="hint">Click this, then click the map to place your starting point.</p>
    </section>

    <!-- Step 2: Add jobs -->
    <section class="control-group">
      <h2>Step 2 — Jobs</h2>
      <button data-mode="job" onclick="setMode('job')">
        📌 Add Jobs
      </button>
      <button class="btn-secondary" onclick="clearJobs()">🗑 Clear Jobs</button>
      <p class="hint">Click this, then click the map to add stops. Click the button again to stop adding.</p>
    </section>

    <!-- Step 3: Route -->
    <section class="control-group">
      <h2>Step 3 — Route</h2>
      <button class="btn-primary" onclick="optimizeRoute()">
        ⚡ Optimise Route (VROOM)
      </button>
      <button onclick="routeAtoB()">
        ➡ Route in Order (Valhalla)
      </button>
    </section>

    <!-- Analysis -->
    <section class="control-group">
      <h2>Analysis</h2>
      <button data-mode="isochrone" onclick="setMode('isochrone')">
        🕐 Isochrone (5/10/15 min)
      </button>
      <button class="btn-secondary" onclick="clearIsochrone()">✕ Clear Isochrone</button>
      <p class="hint">Click this, then click any point on the map.</p>
    </section>

    <!-- Clear all -->
    <section class="control-group">
      <button class="btn-danger" onclick="clearAll()">🗑 Clear Everything</button>
    </section>

    <div id="status-bar"></div>
  </div>

  <script src="js/scripts.js"></script>
</body>
</html>
